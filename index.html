<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur 4 Folder</title>
    <style>
        /* --- CSS DIMULAI DI SINI --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Membuat 2 kolom */
            gap: 25px;
            padding: 20px;
        }

        /* Responsif: jadi 1 kolom di layar kecil, 4 kolom di layar lebar */
        @media (min-width: 600px) {
            .container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .folder {
            width: 140px;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Efek Hover */
        .folder:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            background-color: #fffdf0; /* Warna krem lembut saat hover */
        }

        .icon {
            font-size: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        .folder p {
            font-size: 15px;
            color: #444;
            font-weight: 600;
            text-align: center;
        }

        /* Warna spesifik untuk ikon agar lebih hidup */
        .folder:nth-child(1) .icon { color: #FFD700; }
        .folder:nth-child(2) .icon { color: #42a5f5; }
        .folder:nth-child(3) .icon { color: #66bb6a; }
        .folder:nth-child(4) .icon { color: #ef5350; }
        
        /* --- CSS SELESAI --- */
    </style>
</head>
<body>

    <div class="container">
        <!-- Folder 1 -->
        <div class="folder">
            <span class="icon">📁</span>
            <p>Proyek A</p>
        </div>

        <!-- Folder 2 -->
        <div class="folder">
            <span class="icon">📁</span>
            <p>Laporan</p>
        </div>

        <!-- Folder 3 -->
        <div class="folder">
            <span class="icon">📁</span>
            <p>Arsip</p>
        </div>

        <!-- Folder 4 -->
        <div class="folder">
            <span class="icon">📁</span>
            <p>Pengaturan</p>
        </div>
    </div>

</body>
</html>
