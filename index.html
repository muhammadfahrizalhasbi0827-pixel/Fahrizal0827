<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Card Carousel</title>
    <style>
        /* CSS Gabungan */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Header & Text */
        .hero-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero-section h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .hero-section h1 span {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            color: #94a3b8;
            max-width: 500px;
        }

        /* Carousel Container */
        .carousel-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px 0;
        }

        .carousel {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            padding: 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        /* Card Design */
        .card {
            flex: 0 0 300px;
            height: 400px;
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            scroll-snap-align: center;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: #38bdf8;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 25px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        }

        @media (max-width: 600px) {
            .hero-section h1 { font-size: 2rem; }
            .card { flex: 0 0 80%; }
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <h1>Jelajahi <span>Keindahan</span> Dunia</h1>
        <p>Temukan destinasi impianmu melalui petualangan visual yang tak terlupakan.</p>
    </header>

                <div class="card-content">
                    <h3>Danau Biru</h3>
                </div>
