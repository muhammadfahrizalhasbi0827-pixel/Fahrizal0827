<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Interaktif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Styling Judul/Section */
        .section {
            background: #fff;
            margin-bottom: 30px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            border-left: 5px solid #007bff;
            padding-left: 15px;
            margin-bottom: 20px;
            color: #007bff;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        /* --- BIODATA --- */
        .profile-flex {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #007bff;
        }

        .bio-info table {
            width: 100%;
            border-collapse: collapse;
        }

        .bio-info td {
            padding: 8px 0;
        }

        .label { font-weight: bold; width: 120px; }

        /* --- GALLERY --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery-grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
        }

        /* --- VIDEO --- */
        .video-container {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .profile-flex { justify-content: center; text-align: center; }
            .bio-info td { display: block; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- BAGIAN 1: BIODATA -->
        <div class="section">
            <h2>Profil Biodata</h2>
            <div class="profile-flex">
                <!-- Ganti 'foto-profil.jpg' dengan nama file fotomu -->
                <img src="foto-profil.jpg" alt="Foto Profil" class="profile-img">
                <div class="bio-info">
                    <table>
                        <tr>
                            <td class="label">Nama</td>
                            <td>: Gemini AI</td>
                        </tr>
                        <tr>
                            <td class="label">Pekerjaan</td>
                            <td>: AI Assistant</td>
                        </tr>
                        <tr>
                            <td class="label">Keahlian</td>
                            <td>: Coding, Menulis, Analisis</td>
                        </tr>
                        <tr>
                            <td class="label">Lokasi</td>
                            <td>: Cloud Server</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <!-- BAGIAN 2: GALLERY -->
        <div class="section">
            <h2>Gallery Foto</h2>
            <div class="gallery-grid">
                <!-- Ganti src dengan nama file gambar di foldermu -->
                <img src="gambar1.jpg" alt="Gallery 1">
                <img src="gambar2.jpg" alt="Gallery 2">
                <img src="gambar3.jpg" alt="Gallery 3">
                <img src="gambar4.jpg" alt="Gallery 4">
            </div>
        </div>

        <!-- BAGIAN 3: VIDEO -->
        <div class="section">
            <h2>Video Kenangan</h2>
            <div class="video-container">
                <!-- Ganti 'video-saya.mp4' dengan nama file videomu -->
                <video controls>
                    <source src="video-saya.mp4" type="video/mp4">
                    Browser Anda tidak mendukung tag video.
                </video>
            </div>
        </div>

    </div>

</body>
</html>
