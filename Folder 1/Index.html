<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="Folder 1">
    <meta name="Folder 1" content="width=device-width, initial-scale=1.0">
    <title>Salty Breeze | Home</title>
    <style>
        /* CSS DIMULAI DI SINI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f8ff; /* Light Sea Blue */
            color: #2c3e50;
            line-height: 1.6;
            background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                              url('https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=1920');
            background-attachment: fixed;
            background-size: cover;
        }

        /* Navigation */
        nav {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        nav a {
            text-decoration: none;
            color: #0077be;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff7f50; /* Coral */
        }

        /* Container Utama */
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #0077be;
            margin-bottom: 15px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .divider {
            height: 3px;
            width: 60px;
            background: #ff7f50;
            margin: 20px auto;
        }

        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
        }

        .hero-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8rem;
            color: #666;
        }
        /* CSS SELESAI DI SINI */
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h1>SALTY BREEZE</h1>
        <div class="divider"></div>
        <p>Rasakan kedamaian di setiap butiran pasir dan hembusan angin laut.</p>
        
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1000" 
             alt="Aesthetic Beach" 
             class="hero-img">
        
        <footer style="text-align: center;">
            <p>&copy; 2026 Web Aesthetic Pantai. Dibuat dengan penuh ketenangan.</p>
        </footer>
    </div>

</body>
</html>
